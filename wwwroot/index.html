<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Resume Screener</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --accent: #e2e8f0;
            --success: #10b981;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 40px 20px; line-height: 1.5; }
        .container { max-width: 900px; margin: 0 auto; }
        
        header { margin-bottom: 32px; text-align: center; }
        header h1 { font-size: 2.25rem; font-weight: 700; color: #1e1b4b; letter-spacing: -0.025em; }
        header p { color: var(--text-muted); margin-top: 8px; font-size: 1.1rem; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .card { background: var(--bg-card); border: 1px solid var(--border); padding: 28px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .full-width { grid-column: span 2; }
        
        h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; color: #1e293b; }
        .step-num { background: var(--primary); color: white; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.85rem; font-weight: 700; }
        
        label { font-weight: 500; font-size: 0.875rem; color: #475569; display: block; margin-top: 14px; margin-bottom: 4px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; background: #f8fafc; transition: all 0.2s; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        
        input[type="file"] { padding: 8px; background: #fff; cursor: pointer; }
        
        button { background: var(--primary); color: white; border: none; font-size: 0.95rem; font-weight: 600; padding: 12px 20px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 18px; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        .status-msg { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; display: none; }
        .status-msg.success { display: block; background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .status-msg.loading { display: block; background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .status-msg.error { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }

        pre { background: #0f172a; color: #e2e8f0; padding: 20px; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; font-family: monospace; font-size: 0.95rem; margin-top: 15px; border-left: 4px solid var(--primary); max-height: 400px; overflow-y: auto; }
        
        .spinner { width: 18px; height: 18px; border: 2px solid #ffffff; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>AI-Powered Resume Screening</h1>
            <p>Accelerate your recruitment workflow with contextual automated evaluation matching</p>
        </header>

        <div class="grid">
            <div class="card">
                <h2><span class="step-num">1</span> Candidate Profiling</h2>
                <label>Full Name</label>
                <input type="text" id="candName" placeholder="Jane Doe">
                
                <label>Email Address</label>
                <input type="email" id="candEmail" placeholder="jane.doe@example.com">
                
                <button id="btnCreate" onclick="createCandidate()">
                    <span class="spinner" id="spinCreate"></span>Create System Record
                </button>
                <div id="candResult" class="status-msg"></div>
            </div>

            <div class="card">
                <h2><span class="step-num">2</span> Digital Payload Upload</h2>
                <label>Target Candidate System ID</label>
                <input type="number" id="resumeCandId" placeholder="Awaiting Step 1 execution...">
                
                <label>Document Stream (PDF Engine Only)</label>
                <input type="file" id="resumeFile" accept=".pdf">
                
                <button id="btnUpload" onclick="uploadResume()">
                    <span class="spinner" id="spinUpload"></span>Parse Core Metrics
                </button>
                <div id="uploadResult" class="status-msg"></div>
            </div>

            <div class="card full-width">
                <h2><span class="step-num">3</span> Orchestrate OpenAI Screening</h2>
                <div style="display: grid; grid-template-columns: 150px 1fr; gap: 16px;">
                    <div>
                        <label>Active Resume ID</label>
                        <input type="number" id="screenResumeId" placeholder="Doc ID">
                    </div>
                    <div>
                        <label>Target Role Specifications / Job Description</label>
                        <textarea id="jobDesc" rows="5" placeholder="Paste structural requirements, required stacks, and target milestones..."></textarea>
                    </div>
                </div>
                
                <button id="btnScreen" onclick="screenResume()">
                    <span class="spinner" id="spinScreen"></span>Execute AI Evaluation Matrices
                </button>
                
                <h3 style="margin-top: 24px; font-size: 1.1rem;">Pipeline Output Metrics:</h3>
                <pre id="aiOutput">Awaiting generation matrix initialization...</pre>
            </div>
        </div>
    </div>

    <script>
        function setUIState(action, isLoading, statusText, statusClass, targetId) {
            const btn = document.getElementById(`btn${action}`);
            const spinner = document.getElementById(`spin${action}`);
            const feedback = document.getElementById(targetId);

            if(isLoading) {
                btn.disabled = true;
                spinner.style.display = 'inline-block';
                feedback.className = 'status-msg loading';
                feedback.innerText = statusText;
            } else {
                btn.disabled = false;
                spinner.style.display = 'none';
                feedback.className = `status-msg ${statusClass}`;
                feedback.innerText = statusText;
            }
        }

        async function createCandidate() {
            const name = document.getElementById('candName').value;
            const email = document.getElementById('candEmail').value;
            if(!name || !email) { alert("Please complete form properties."); return; }

            setUIState('Create', true, 'Creating system instance...', '', 'candResult');
            
            try {
                const response = await fetch('/api/candidates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, email: email })
                });
                const data = await response.json();
                
                setUIState('Create', false, `Success! Candidate Database ID Assigned: ${data.id}`, 'success', 'candResult');
                document.getElementById('resumeCandId').value = data.id;
            } catch(e) {
                setUIState('Create', false, 'Infrastructure connection exception.', 'error', 'candResult');
            }
        }

        async function uploadResume() {
            const candId = document.getElementById('resumeCandId').value;
            const fileInput = document.getElementById('resumeFile');
            if(!candId || !fileInput.files[0]) { alert("Entity reference validation failure."); return; }
            
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            setUIState('Upload', true, 'Initializing parsing array engines...', '', 'uploadResult');

            try {
                const response = await fetch(`/api/resumes/upload?candidateId=${candId}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                setUIState('Upload', false, `Compiled! File Saved as Object Node ID: ${data.resumeId}`, 'success', 'uploadResult');
                document.getElementById('screenResumeId').value = data.resumeId;
            } catch(e) {
                setUIState('Upload', false, 'Parsing subsystem exception occurred.', 'error', 'uploadResult');
            }
        }

        async function screenResume() {
            const resumeId = document.getElementById('screenResumeId').value;
            const jobDesc = document.getElementById('jobDesc').value;
            if(!resumeId || !jobDesc) { alert("Execution parameters missing."); return; }

            const btn = document.getElementById('btnScreen');
            const spinner = document.getElementById('spinScreen');
            
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            document.getElementById('aiOutput').innerText = "[PROCESSING] Transmitting text nodes to analysis context window...";

            try {
                const response = await fetch(`/api/resumes/screen?resumeId=${resumeId}&jobDescription=${encodeURIComponent(jobDesc)}`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data && data.result && data.result.trim() !== "") {
                    document.getElementById('aiOutput').innerText = data.result;
                } else {
                    document.getElementById('aiOutput').innerText = "Notice: No assessment matrix data returned from system.";
                }
            } catch(e) {
                document.getElementById('aiOutput').innerText = "Error: Process crashed during system evaluation.";
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
